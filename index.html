<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vocamind</title>
    <meta name="description" content="Vocamind — the lazy way to memorize words and phrases. Offline, private, no sign-up." />
    <style>
      :root {
        color-scheme: light dark;
        --bg: #ffffff;
        --fg: #1a1a1a;
        --muted: #5a5a5a;
        --accent: #0a7ea4;
      }
      @media (prefers-color-scheme: dark) {
        :root { --bg: #151718; --fg: #ececec; --muted: #9ba1a6; --accent: #4cc2e0; }
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg);
        color: var(--fg);
        font: 17px/1.6 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        text-align: center;
        padding: 24px;
      }
      main { max-width: 480px; }
      h1 { font-size: 2.4rem; margin: 0 0 8px; }
      .tagline { font-size: 1.2rem; color: var(--muted); margin: 0 0 24px; }
      p { margin: 12px 0; }
      a { color: var(--accent); }
      nav { margin-top: 28px; display: flex; gap: 20px; justify-content: center; }
      footer { margin-top: 40px; color: var(--muted); font-size: 0.9rem; }
    </style>
  </head>
  <body>
    <main>
      <h1>Vocamind</h1>
      <p class="tagline">The lazy way to memorize.</p>
      <p>
        Add a word, phrase, or expression once. Vocamind reminds you of your own
        list throughout the day until it sticks — fully offline, no account, no
        tracking.
      </p>
      <nav>
        <a href="./privacy.html">Privacy Policy</a>
        <a href="mailto:vocamind.app@gmail.com">Contact</a>
      </nav>
      <footer>© 2026 Vocamind</footer>
    </main>
  </body>
</html>
